<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<script src="https://cdn.tailwindcss.com"></script>
<title>Payroll System - Excel Accurate</title>
</head>

<body class="bg-gray-100 p-6">

<div class="max-w-7xl mx-auto bg-white p-6 rounded-xl shadow">

<h2 class="text-xl font-bold mb-4">نظام الضرائب (مطابق Excel 100%)</h2>

<div class="grid grid-cols-2 md:grid-cols-6 gap-3 mb-6">

<input id="name" placeholder="اسم" class="p-2 border rounded">
<input id="gross" type="number" placeholder="المرتب" class="p-2 border rounded">
<input id="days" type="number" value="30" placeholder="أيام الشهر" class="p-2 border rounded">
<input id="prevDays" type="number" value="0" placeholder="Prev Days" class="p-2 border rounded">
<input id="prevTaxable" type="number" value="0" placeholder="Prev Taxable" class="p-2 border rounded">
<input id="prevTaxes" type="number" value="0" placeholder="Prev Taxes" class="p-2 border rounded">

<select id="taxCode" class="p-2 border rounded">
<option value="1">1 Regular</option>
<option value="2">2 Flat 10%</option>
<option value="4">4 Exemption 30k</option>
<option value="8">8 Resignation</option>
</select>

<button onclick="calc()" class="bg-blue-600 text-white rounded p-2">احسب</button>

</div>

<table class="w-full text-center border">
<thead class="bg-black text-white">
<tr>
<th>اسم</th>
<th>Taxable</th>
<th>Taxpool</th>
<th>ضريبة الشهر</th>
<th>Net</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

</div>

<script>

function R(n){return Math.round(n*100)/100;}

function calc(){

let name = document.getElementById("name").value;
let S7 = +document.getElementById("gross").value;
let AE7 = +document.getElementById("days").value;
let prevDays = +document.getElementById("prevDays").value;
let prevTaxable = +document.getElementById("prevTaxable").value;
let prevTaxes = +document.getElementById("prevTaxes").value;
let taxCode = +document.getElementById("taxCode").value;

if(!name || !S7) return;

// ================= INSURANCE =================
let insurance = R(Math.min(S7,14500)*0.11);

// ================= EXEMPTION =================
let exemption = (taxCode==4 ? 30000 : 20000);
let dailyEx = R(exemption/360*AE7);

// ================= TAXABLE =================
let taxable = R(S7 - insurance - dailyEx);
if(taxable<0) taxable=0;

// ================= CUMULATIVE =================
let totalDays = prevDays + AE7;
let totalTaxable = prevTaxable + taxable;

// ================= TAXPOOL =================
let taxpool = 0;
if(totalDays>0){
taxpool = Math.floor((totalTaxable/totalDays*360)/10)*10;
}

// ================= FLAT TAX =================
if(taxCode==2){
let tax = R(taxable*0.1);
addRow(name,taxable,taxpool,tax,S7-insurance-tax);
return;
}

// ================= BRACKETS =================
let rem = taxpool;
let tax = 0;

// 0%
if(rem>40000){rem-=40000}else rem=0;

// 10%
if(rem>0){let x=Math.min(rem,15000);tax+=x*0.1;rem-=x;}

// 15%
if(rem>0){let x=Math.min(rem,15000);tax+=x*0.15;rem-=x;}

// 20%
if(rem>0){let x=Math.min(rem,130000);tax+=x*0.2;rem-=x;}

// 22.5%
if(rem>0){let x=Math.min(rem,200000);tax+=x*0.225;rem-=x;}

// 25%
if(rem>0){let x=Math.min(rem,800000);tax+=x*0.25;rem-=x;}

// 27.5%
if(rem>0){tax+=rem*0.275;}

// ================= TOTAL TAX =================
let totalTax = R(tax/360*totalDays);

// ================= CURRENT MONTH TAX =================
let monthTax = totalTax - prevTaxes;
if(monthTax<0) monthTax=0;

// ================= NET =================
let martyrs = R(S7*0.0005);
let net = R(S7 - insurance - monthTax - martyrs);

// ================= UI =================
addRow(name,taxable,taxpool,monthTax,net);

}

function addRow(n,t,tp,tax,net){
document.getElementById("table").innerHTML+=`
<tr class="border">
<td>${n}</td>
<td>${t}</td>
<td>${tp}</td>
<td>${tax}</td>
<td>${net}</td>
</tr>`;
}

</script>

</body>
</html>
